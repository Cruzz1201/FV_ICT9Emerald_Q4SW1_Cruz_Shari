<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Seatwork 1</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background-image: url('https://i.pinimg.com/originals/fb/14/bd/fb14bd95410f407e6670561f61dc0e27.gif');
            background-repeat: no-repeat;
            background-size: cover;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            padding-top: 45px;
        }
    </style>

</head>
<body>

    <div class="container" style="background-color: rgba(255, 255, 255, 0.737); width: 550px;">

        <div class="row">
            <center>
            <img src="https://i.pinimg.com/736x/b6/e6/87/b6e687094f11e465e7d710a6b5754a4e.jpg" style="width: 50px; height: 50px; border-radius: 100px;">
            </center>
            <h1 style="color: palevioletred; text-align: center;"><b>Login</b></h1>
        </div>

        <div class="row">
            <label for="uname"><b>Username</b></label>
            <input id="uname" type="text" placeholder="Enter your username..." class="form-control" style="width: 500px;">
        </div>

        <div class="row">
            <label for="password"><b>Password</b></label>
            <input id="password" type="text" placeholder="Enter your password..." class="form-control" style="width: 500px;">
        </div>

    </div>
</body>
</html>
