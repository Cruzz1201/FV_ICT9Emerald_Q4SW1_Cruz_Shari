<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Seatwork 1</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background-image: url('https://i.pinimg.com/originals/fb/14/bd/fb14bd95410f407e6670561f61dc0e27.gif');
            background-repeat: no-repeat;
            background-size: cover;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            padding-top: 45px;
            padding-bottom: 45px;
        }
    </style>

</head>
<body>

    <div class="container" style="background-color: rgba(255, 255, 255, 0.737); width: 550px; height: 560px; padding: 50px; border-radius: 15px;">

        <form>

            <div class="row">
                <center>
                 <img src="https://i.pinimg.com/736x/b6/e6/87/b6e687094f11e465e7d710a6b5754a4e.jpg"  style="width: 50px; height: 50px; border-radius: 100px;">
                </center>
                <h1 style="color: palevioletred; text-align: center;"><b>Login</b></h1>
                <p style="color: palevioletred; text-align: center;">Welcome back!</p>
            </div>

            <div class="row">
                <label for="uname" style="background-color: rgb(241, 123, 172); color: white; width: auto; border-radius: 10px;"><b>Username</b></label>
                <input id="uname" type="text" placeholder="Enter your username..." class="form-control" style="width: 500px;" required> 
            </div>

            <br>

            <div class="row">
                <label for="password" style="background-color: rgb(241, 123, 172); color: white; width: auto; border-radius: 10px;"><b>Password</b></label>
                <input id="password" type="password" placeholder="Enter your password..." class="form-control" style="width: 500px;" required>
            </div>

            <br>

            <div class="">
                <input type="checkbox" class="form-check-input" id="check" name="confirm" value="yes">
                <label class="form-check-label" for="check">Stay logged in.</label>
                <p style="color: palevioletred; text-align: left;"><i>Your session will stay active on this device.</i></p>
            </div>

         <br>

            <div class="d-grid gap-3">
                <div class="row">   
                    <div class="col">
                        <center>
                            <input class="btn btn-sm" value="Login" style="background-color: pink; color: white; width: 50px;" onclick="loginNow()"></button>

                            <input class="btn btn-sm" type="reset" value="Cancel" style="background-color: pink; color: white;" ></button>
                        </center>
                    </div>
                </div>
            </div>
           
        </form>
    
        <br>

        <div class="row">
            <p style="color: palevioletred; text-align: center;"><i><u>Forgot username / password?</u></i></p>
        </div>

    </div>

    <script>
        function loginNow(){

            var uname = document.getElementById("uname").value;
            var password = document.getElementById("password").value;

            let ValidUname = "Rainglow10";
            let ValidPw = "penguin";

            if (uname === "" || password === ""){
                alert("Input username/password.")
            }

            else if (uname == ValidUname && password == ValidPw){
                alert ("Hi there, Rainglow10!")
            }

            else if (uname == "hi" && password == "hello"){
                alert ("Incorrect username/password.")
            }
        }

        function checkBox() {
            let confirm = document.getElementById("check").checked; 
            //when checked, it reads true

            switch(confirm) {
                case true:
                 message = "Welcome Rainglow10!"
                break;

                case false:
                    message = "Incorrect username and/or password."
                break;
            }
        }

    </script>

</body>
</html>
